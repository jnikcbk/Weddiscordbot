<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRM Premium Dashboard</title>
    <style>
        :root {
            --primary: #5865F2;
            --bg: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #2c2f33, #0f0f13);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #5865F2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #b9bbbe; margin-bottom: 40px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        /* Bot Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.2);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #43b581;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .bot-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2f3136;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .bot-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; display: block; }

        /* Nút bấm */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #4752c4; }

        .btn-sub { background: rgba(255, 255, 255, 0.1); color: white; font-size: 0.9rem; }
        .btn-sub:hover { background: rgba(255, 255, 255, 0.2); }

        /* Ô Thêm Bot */
        .add-card {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            min-height: 250px;
        }

        .add-card:hover {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.05);
        }

        .add-icon {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <h1>NRM BOT PANEL</h1>
    <p>Quản lý hệ thống Bot Discord của bạn</p>

    <div class="container">
        <div class="card">
            <div class="bot-img">🤖</div>
            <span class="bot-name"><span class="status-dot"></span> NRM Bot Music</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=1477295832335384598&scope=identify%20guilds&response_type=code&redirect_uri=https%3A%2F%2Fweddiscordbot.vercel.app%2Fapi%2Fauth%2Fcallback">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cài đặt lệnh</button>
                <button class="btn-sub">Xem thống kê</button>
            </div>
        </div>

        <div class="card">
            <div class="bot-img">🛡️</div>
            <span class="bot-name"><span class="status-dot"></span> NRM Security</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=ID_BOT_2_CUA_BAN&scope=identify%20guilds&response_type=code&redirect_uri=https%3A%2F%2Fweddiscordbot.vercel.app%2Fapi%2Fauth%2Fcallback">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cấu hình bảo mật</button>
                <button class="btn-sub">Nhật ký Bot</button>
            </div>
        </div>

        <a href="https://discord.com/developers/applications" target="_blank" style="display: contents;">
            <div class="card add-card">
                <div class="add-icon">+</div>
                <span style="color: rgba(255, 255, 255, 0.5);">Thêm Bot Mới</span>
            </div>
        </a>
    </div>

</body>
</html>
