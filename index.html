<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MY_CREATIVE_SPACE</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --accent: #ff4757;
            --card: #ffffff;
            --shadow: 8px 8px 0px #000;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Đồng hồ khổng lồ */
        #clock-container {
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        #clock {
            font-size: 120px;
            font-weight: 900;
            color: #000;
            letter-spacing: -5px;
            margin: 0;
        }

        /* Ghi chú kéo thả */
        .note {
            position: absolute;
            width: 200px;
            padding: 20px;
            background: #fff;
            border: 3px solid #000;
            box-shadow: var(--shadow);
            cursor: move;
            transition: transform 0.1s;
        }

        .note:active { transform: scale(1.05) rotate(2deg); }

        .note h3 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 2px solid #000; }
        .note p { font-size: 13px; line-height: 1.4; margin: 0; color: #333; }

        /* Widget âm thanh */
        #audio-widget {
            position: fixed;
            bottom: 30px; right: 30px;
            background: #fff;
            border: 3px solid #000;
            padding: 15px 25px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Thanh menu dưới */
        #dock {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .dock-item {
            padding: 10px 20px;
            background: #000;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .dock-item:hover { transform: translateY(-5px); background: var(--accent); }

    </style>
</head>
<body>

    <div id="clock-container">
        <div id="clock">00:00</div>
        <div style="font-weight: bold; letter-spacing: 5px;">THỨ HAI, 16 THÁNG 3</div>
    </div>

    <div class="note" style="top: 300px; left: 100px; background: #fff740;">
        <h3>Ý tưởng mới</h3>
        <p>Làm một dự án web không giống ai vào tuần sau. Phải thật cháy!</p>
    </div>

    <div class="note" style="top: 150px; right: 150px; background: #7afaff;">
        <h3>Reminder</h3>
        <p>Uống nước đầy đủ và nghỉ ngơi sau mỗi 45 phút code.</p>
    </div>

    <div id="audio-widget">
        <div class="play-btn" id="play-btn">▶</div>
        <div>
            <div style="font-weight: bold; font-size: 12px;">LO-FI FOCUS</div>
            <div style="font-size: 10px; opacity: 0.6;">SÓNG BIỂN RÌ RÀO</div>
        </div>
    </div>

    <div id="dock">
        <button class="dock-item" onclick="createNote()">+ THÊM GHI CHÚ</button>
        <button class="dock-item" id="bg-toggle">ĐỔI MÀU NỀN</button>
    </div>

    <script>
        // 1. Đồng hồ thời gian thực
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Logic kéo thả ghi chú
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                el.style.zIndex = 1000;
            }

            function elementDrag(e) {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                el.style.zIndex = 1;
            }
        }

        document.querySelectorAll('.note').forEach(makeDraggable);

        // 3. Tạo ghi chú mới
        function createNote() {
            const colors = ['#fff740', '#7afaff', '#ff7eb9', '#ff9ee9'];
            const newNote = document.createElement('div');
            newNote.className = 'note';
            newNote.style.top = '100px';
            newNote.style.left = '100px';
            newNote.style.background = colors[Math.floor(Math.random() * colors.length)];
            newNote.innerHTML = `<h3>Ghi chú mới</h3><p contenteditable="true">Click để viết nội dung vào đây...</p>`;
            document.body.appendChild(newNote);
            makeDraggable(newNote);
        }

        // 4. Giả lập âm thanh (White Noise)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isPlaying = false;
        let noiseNode;

        document.getElementById('play-btn').onclick = function() {
            if (!isPlaying) {
                const bufferSize = 2 * audioCtx.sampleRate,
                buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                noiseNode.loop = true;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400; // Tiếng trầm giống tiếng sóng/mưa
                noiseNode.connect(filter);
                filter.connect(audioCtx.destination);
                noiseNode.start();
                this.innerText = '■';
                isPlaying = true;
            } else {
                noiseNode.stop();
                this.innerText = '▶';
                isPlaying = false;
            }
        };

        // 5. Đổi màu nền ngẫu nhiên
        document.getElementById('bg-toggle').onclick = () => {
            const colors = ['#f0f2f5', '#e3f2fd', '#fce4ec', '#f1f8e9', '#fff3e0'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        };

    </script>
</body>
</html>
